<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#e8eef4" />
  <title>Where is bobo?</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
  <style>
    :root {
      --text: #1e293b;
      --muted: #64748b;
      --accent: #0284c7;
      --panel: rgba(255, 255, 255, 0.94);
      --edge: rgba(15, 23, 42, 0.08);
    }

    *, *::before, *::after { box-sizing: border-box; }
    html {
      height: 100%;
      height: 100dvh;
      -webkit-text-size-adjust: 100%;
      -webkit-tap-highlight-color: transparent;
    }
    body {
      margin: 0;
      min-height: 100dvh;
      font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
      background: #e2e8f0;
      color: var(--text);
      overflow: hidden;
    }

    #map { position: fixed; inset: 0; z-index: 0; }

    .panel {
      position: fixed;
      z-index: 1000;
      left: 0;
      right: 0;
      bottom: 0;
      padding: 0 max(16px, env(safe-area-inset-left), env(safe-area-inset-right)) max(16px, env(safe-area-inset-bottom));
      background: var(--panel);
      border-radius: 20px 20px 0 0;
      border: 1px solid var(--edge);
      border-bottom: none;
      box-shadow: 0 -4px 24px rgba(15, 23, 42, 0.08);
    }
    .panel-inner { padding: 18px 4px 4px; }

    .title {
      margin: 0;
      font-size: clamp(1.2rem, 3.8vw, 1.45rem);
      font-weight: 600;
      line-height: 1.2;
    }

    .device {
      margin: 8px 0 0;
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--text);
      word-break: break-word;
    }

    .last-updated {
      margin-top: 14px;
    }
    .lu-label {
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 6px;
    }
    .lu-value {
      font-size: 0.95rem;
      font-weight: 500;
      color: var(--text);
      line-height: 1.45;
      word-break: break-word;
    }

    .err {
      margin-top: 10px;
      padding: 10px 12px;
      border-radius: 10px;
      background: #fff1f2;
      border: 1px solid #fecdd3;
      color: #9f1239;
      font-size: 0.82rem;
      line-height: 1.4;
      display: none;
    }
    .err.visible { display: block; }

    @media (min-width: 720px) {
      .panel {
        left: 16px;
        right: auto;
        bottom: auto;
        top: 16px;
        width: min(300px, calc(100vw - 32px));
        border-radius: 16px;
        border: 1px solid var(--edge);
        box-shadow: 0 8px 32px rgba(15, 23, 42, 0.1);
      }
      .panel-inner { padding: 18px; }
    }

    @media (max-width: 719px) {
      .leaflet-bottom.leaflet-right {
        bottom: auto !important;
        top: max(10px, env(safe-area-inset-top)) !important;
        right: max(10px, env(safe-area-inset-right)) !important;
      }
    }

    .leaflet-control-zoom {
      border: 1px solid var(--edge) !important;
      border-radius: 12px !important;
      overflow: hidden;
      box-shadow: 0 2px 12px rgba(15, 23, 42, 0.1) !important;
    }
    .leaflet-control-zoom a {
      width: 40px !important;
      height: 40px !important;
      line-height: 40px !important;
      color: var(--text) !important;
      background: #fff !important;
    }
    .leaflet-control-attribution {
      font-size: 10px !important;
      background: rgba(255, 255, 255, 0.85) !important;
      color: var(--muted) !important;
    }

    .tag-marker-wrap {
      background: none !important;
      border: none !important;
    }
    .rig-marker {
      position: relative;
      width: 92px;
      height: 42px;
    }
    .rig-marker svg {
      display: block;
      filter: drop-shadow(0 2px 5px rgba(15, 23, 42, 0.3));
    }
    .rig-pulse {
      position: absolute;
      left: 50%;
      bottom: 2px;
      width: 56px;
      height: 56px;
      margin-left: -28px;
      border-radius: 50%;
      border: 2px solid rgba(234, 88, 12, 0.45);
      animation: rigPulse 2s ease-out infinite;
      pointer-events: none;
      z-index: 0;
    }
    @keyframes rigPulse {
      0% { transform: scale(0.75); opacity: 0.7; }
      70% { transform: scale(1.35); opacity: 0; }
      100% { transform: scale(1.35); opacity: 0; }
    }
  </style>
</head>
<body>
  <div id="map" role="application" aria-label="Map"></div>

  <aside class="panel">
    <div class="panel-inner">
      <h1 class="title">Where is bobo?</h1>
      <p class="device" id="tagTitle">—</p>
      <div class="last-updated">
        <div class="lu-label">Last updated</div>
        <div class="lu-value" id="lastUpdatedLine">—</div>
      </div>
      <div class="err" id="errorBanner" role="status"><span id="errorText"></span></div>
    </div>
  </aside>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script>
    (function () {
      const REFRESH_MS = 30 * 1000;

      const map = L.map('map', { zoomControl: true, zoomSnap: 0.5 }).setView([20, 0], 2);

      L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
        attribution: '&copy; OpenStreetMap &copy; CARTO',
        subdomains: 'abcd',
        maxZoom: 20,
      }).addTo(map);

      map.zoomControl.setPosition('bottomright');

      var rigSvg =
        '<div class="rig-marker" aria-hidden="true">' +
        '<span class="rig-pulse"></span>' +
        '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 92 42" width="92" height="42">' +
        '<ellipse cx="46" cy="38" rx="36" ry="3.2" fill="rgba(15,23,42,0.14)"/>' +
        '<g>' +
        '<rect x="4" y="10" width="38" height="14" rx="2.5" fill="#111827" stroke="#030712" stroke-width="0.75"/>' +
        '<rect x="7" y="4" width="32" height="10" rx="2" fill="#1f2937" stroke="#334155" stroke-width="0.5"/>' +
        '<rect x="9" y="13" width="12" height="7" rx="1" fill="#93c5fd" opacity="0.5"/>' +
        '<rect x="24" y="13" width="12" height="7" rx="1" fill="#93c5fd" opacity="0.5"/>' +
        '<rect x="3" y="16" width="5" height="11" rx="1" fill="#e5e7eb"/>' +
        '<line x1="4" y1="20" x2="7" y2="20" stroke="#9ca3af" stroke-width="0.6"/>' +
        '<line x1="4" y1="22" x2="7" y2="22" stroke="#9ca3af" stroke-width="0.6"/>' +
        '</g>' +
        '<rect x="41" y="23" width="10" height="5" rx="1.2" fill="#4b5563"/>' +
        '<g>' +
        '<rect x="52" y="10" width="36" height="20" rx="2.5" fill="#ea580c" stroke="#9a3412" stroke-width="0.8"/>' +
        '<rect x="54" y="12" width="32" height="6" rx="1" fill="#fff"/>' +
        '<text x="70" y="27" font-family="Segoe UI,system-ui,sans-serif" font-size="12" font-weight="800" fill="#fff" text-anchor="middle">U</text>' +
        '</g>' +
        '<g fill="#0a0a0a" stroke="#000" stroke-width="0.4">' +
        '<circle cx="15" cy="32" r="6"/><circle cx="15" cy="32" r="2.5" fill="#404040" stroke="none"/>' +
        '<circle cx="33" cy="32" r="6"/><circle cx="33" cy="32" r="2.5" fill="#404040" stroke="none"/>' +
        '<circle cx="61" cy="32" r="5"/><circle cx="61" cy="32" r="2" fill="#404040" stroke="none"/>' +
        '<circle cx="80" cy="32" r="5"/><circle cx="80" cy="32" r="2" fill="#404040" stroke="none"/>' +
        '</g>' +
        '</svg></div>';

      const icon = L.divIcon({
        className: 'tag-marker-wrap',
        html: rigSvg,
        iconSize: [92, 42],
        iconAnchor: [46, 42],
      });

      let marker = null;
      let lastKey = null;
      let lastKnownTimeIso = null;

      function formatLocal(iso) {
        if (!iso) return '';
        const d = new Date(iso);
        if (Number.isNaN(d.getTime())) return '';
        return d.toLocaleString(undefined, { dateStyle: 'medium', timeStyle: 'short' });
      }

      function formatAgo(iso) {
        if (!iso) return '';
        const t = new Date(iso).getTime();
        if (Number.isNaN(t)) return '';
        const diff = Date.now() - t;
        const s = Math.floor(diff / 1000);
        if (s < 60) return 'just now';
        const m = Math.floor(s / 60);
        if (m < 60) return m === 1 ? '1 min ago' : m + ' min ago';
        const h = Math.floor(m / 60);
        if (h < 24) return h === 1 ? '1 hr ago' : h + ' hr ago';
        const d = Math.floor(h / 24);
        return d === 1 ? '1 day ago' : d + ' days ago';
      }

      function setLastUpdatedLine(iso) {
        const el = document.getElementById('lastUpdatedLine');
        if (!iso) {
          el.textContent = '—';
          return;
        }
        const local = formatLocal(iso);
        const ago = formatAgo(iso);
        if (local && ago) {
          el.textContent = local + ' · ' + ago;
        } else if (local) {
          el.textContent = local;
        } else if (ago) {
          el.textContent = ago;
        } else {
          el.textContent = '—';
        }
      }

      function setUi(data) {
        document.getElementById('tagTitle').textContent = data.tagName || 'bobo';

        const last = data.lastUpdated || data.timestamp;
        lastKnownTimeIso = last || null;
        setLastUpdatedLine(last);

        const err = document.getElementById('errorBanner');
        if (data.error) {
          document.getElementById('errorText').textContent = data.error;
          err.classList.add('visible');
        } else {
          err.classList.remove('visible');
        }
      }

      function applyLocation(data) {
        setUi(data);
        if (data.lat == null || data.lng == null) return;

        const lat = Number(data.lat);
        const lng = Number(data.lng);
        if (!Number.isFinite(lat) || !Number.isFinite(lng)) return;

        const key = lat.toFixed(5) + ',' + lng.toFixed(5);
        const moved = key !== lastKey;
        lastKey = key;

        if (!marker) {
          marker = L.marker([lat, lng], { icon }).addTo(map);
          map.setView([lat, lng], 15, { animate: true });
        } else {
          marker.setLatLng([lat, lng]);
          if (moved) {
            map.panTo([lat, lng], { animate: true, duration: 0.6, easeLinearity: 0.25 });
          }
        }
      }

      function refreshMapSize() {
        map.invalidateSize({ animate: false });
      }

      async function fetchLocation() {
        try {
          const r = await fetch('/api/location', { cache: 'no-store' });
          const data = await r.json();
          applyLocation(data);
          refreshMapSize();
        } catch (e) {
          console.error(e);
        }
      }

      window.addEventListener('resize', refreshMapSize);
      window.addEventListener('orientationchange', function () {
        setTimeout(refreshMapSize, 200);
      });
      if (window.visualViewport) {
        window.visualViewport.addEventListener('resize', refreshMapSize);
      }

      fetchLocation();
      setInterval(fetchLocation, REFRESH_MS);
      setInterval(function () {
        if (lastKnownTimeIso) setLastUpdatedLine(lastKnownTimeIso);
      }, 15000);
    })();
  </script>
</body>
</html>
