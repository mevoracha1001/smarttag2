<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#e8eef4" />
  <title>Where is bobo?</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
  <style>
    :root {
      --text: #1e293b;
      --muted: #64748b;
      --accent: #0284c7;
      --panel: rgba(255, 255, 255, 0.94);
      --edge: rgba(15, 23, 42, 0.08);
    }

    *, *::before, *::after { box-sizing: border-box; }
    html {
      height: 100%;
      height: 100dvh;
      -webkit-text-size-adjust: 100%;
      -webkit-tap-highlight-color: transparent;
    }
    body {
      margin: 0;
      min-height: 100dvh;
      font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
      background: #e2e8f0;
      color: var(--text);
      overflow: hidden;
    }

    #map { position: fixed; inset: 0; z-index: 0; }

    .panel {
      position: fixed;
      z-index: 1000;
      left: 0;
      right: 0;
      bottom: 0;
      padding: 0 max(16px, env(safe-area-inset-left), env(safe-area-inset-right)) max(16px, env(safe-area-inset-bottom));
      background: var(--panel);
      border-radius: 20px 20px 0 0;
      border: 1px solid var(--edge);
      border-bottom: none;
      box-shadow: 0 -4px 24px rgba(15, 23, 42, 0.08);
    }
    .panel-inner { padding: 18px 4px 4px; }

    .title {
      margin: 0;
      font-size: clamp(1.2rem, 3.8vw, 1.45rem);
      font-weight: 600;
      line-height: 1.2;
    }

    .device {
      margin: 8px 0 0;
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--text);
      word-break: break-word;
    }

    .last-updated {
      margin-top: 14px;
    }
    .lu-label {
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 6px;
    }
    .lu-value {
      font-size: 0.95rem;
      font-weight: 500;
      color: var(--text);
      line-height: 1.45;
      word-break: break-word;
    }

    .err {
      margin-top: 10px;
      padding: 10px 12px;
      border-radius: 10px;
      background: #fff1f2;
      border: 1px solid #fecdd3;
      color: #9f1239;
      font-size: 0.82rem;
      line-height: 1.4;
      display: none;
    }
    .err.visible { display: block; }

    .reload-row {
      display: flex;
      flex-direction: row;
      gap: 10px;
      margin-top: 14px;
    }
    .reload-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      flex: 1;
      min-width: 0;
      padding: 10px 12px;
      font: inherit;
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--text);
      background: #fff;
      border: 1px solid var(--edge);
      border-radius: 10px;
      cursor: pointer;
      box-shadow: 0 1px 2px rgba(15, 23, 42, 0.06);
    }
    .reload-btn:hover:not(:disabled) {
      background: #f8fafc;
      border-color: #cbd5e1;
    }
    .reload-btn:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }
    .reload-btn .fa-arrows-rotate {
      font-size: 1rem;
      flex-shrink: 0;
    }
    .reload-btn.loading .fa-arrows-rotate {
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .history-open-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      flex: 1;
      min-width: 0;
      padding: 10px 12px;
      font: inherit;
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--text);
      background: #fff;
      border: 1px solid var(--edge);
      border-radius: 10px;
      cursor: pointer;
      box-shadow: 0 1px 2px rgba(15, 23, 42, 0.06);
    }
    .history-open-btn:hover {
      background: #f8fafc;
      border-color: #cbd5e1;
    }
    .history-open-btn .fa-clock {
      font-size: 1rem;
      flex-shrink: 0;
      opacity: 0.9;
    }

    .history-sheet {
      position: fixed;
      inset: 0;
      z-index: 1100;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      pointer-events: none;
      visibility: hidden;
      opacity: 0;
      transition: opacity 0.2s ease, visibility 0.2s;
    }
    .history-sheet.is-open {
      pointer-events: auto;
      visibility: visible;
      opacity: 1;
    }
    .history-sheet-backdrop {
      position: absolute;
      inset: 0;
      background: rgba(15, 23, 42, 0.35);
      border: none;
      padding: 0;
      cursor: pointer;
    }
    .history-sheet-panel {
      position: relative;
      min-height: 0;
      max-height: min(78vh, 520px);
      background: var(--panel);
      border-radius: 20px 20px 0 0;
      border: 1px solid var(--edge);
      border-bottom: none;
      box-shadow: 0 -8px 40px rgba(15, 23, 42, 0.12);
      padding: 0 max(16px, env(safe-area-inset-left), env(safe-area-inset-right)) max(16px, env(safe-area-inset-bottom));
      display: flex;
      flex-direction: column;
      flex: 1 1 auto;
      transform: translateY(100%);
      transition: transform 0.25s ease;
    }
    .history-sheet.is-open .history-sheet-panel {
      transform: translateY(0);
    }
    .history-sheet-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 16px 4px 12px;
      border-bottom: 1px solid var(--edge);
    }
    .history-sheet-head h2 {
      margin: 0;
      font-size: 1.05rem;
      font-weight: 600;
    }
    .history-close {
      width: 40px;
      height: 40px;
      border: none;
      border-radius: 10px;
      background: #f1f5f9;
      color: var(--text);
      font-size: 1.35rem;
      line-height: 1;
      cursor: pointer;
      flex-shrink: 0;
    }
    .history-close:hover {
      background: #e2e8f0;
    }
    .history-sheet .history-head {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 8px;
      margin: 12px 0 8px;
    }
    .history-count {
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--muted);
    }
    .history-btn {
      flex: 0 0 auto;
      display: flex;
      width: 100%;
      justify-content: center;
      margin-bottom: 8px;
    }
    .history-list {
      list-style: none;
      margin: 0;
      padding: 0 0 8px;
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      font-size: 0.8rem;
      color: var(--muted);
    }
    .history-list li {
      padding: 8px 0;
      border-bottom: 1px solid rgba(15, 23, 42, 0.06);
      line-height: 1.35;
    }
    .history-list li:last-child { border-bottom: none; }
    .history-list .t {
      font-weight: 600;
      color: var(--text);
      font-size: 0.82rem;
    }
    .history-list .c {
      font-size: 0.7rem;
      margin-top: 2px;
      word-break: break-all;
    }

    @media (min-width: 720px) {
      .history-sheet-panel {
        max-width: 400px;
        margin-left: auto;
        margin-right: auto;
        border-radius: 16px 16px 0 0;
      }
      .panel {
        left: 16px;
        right: auto;
        bottom: auto;
        top: 16px;
        width: min(340px, calc(100vw - 32px));
        border-radius: 16px;
        border: 1px solid var(--edge);
        box-shadow: 0 8px 32px rgba(15, 23, 42, 0.1);
      }
      .panel-inner { padding: 18px; }
    }

    @media (max-width: 719px) {
      .leaflet-bottom.leaflet-right {
        bottom: auto !important;
        top: max(10px, env(safe-area-inset-top)) !important;
        right: max(10px, env(safe-area-inset-right)) !important;
      }
    }

    .leaflet-control-zoom {
      border: 1px solid var(--edge) !important;
      border-radius: 12px !important;
      overflow: hidden;
      box-shadow: 0 2px 12px rgba(15, 23, 42, 0.1) !important;
    }
    .leaflet-control-zoom a {
      width: 40px !important;
      height: 40px !important;
      line-height: 40px !important;
      color: var(--text) !important;
      background: #fff !important;
    }
    .leaflet-control-attribution {
      font-size: 10px !important;
      background: rgba(255, 255, 255, 0.85) !important;
      color: var(--muted) !important;
    }

    .tag-marker-wrap {
      background: none !important;
      border: none !important;
    }
    .rig-marker {
      position: relative;
      width: 58px;
      height: 26px;
    }
    .rig-marker svg {
      display: block;
      filter: drop-shadow(0 1px 3px rgba(0, 0, 0, 0.35));
    }
    .rig-pulse {
      position: absolute;
      left: 50%;
      bottom: 0;
      width: 34px;
      height: 34px;
      margin-left: -17px;
      border-radius: 50%;
      border: 1.5px solid rgba(249, 115, 22, 0.4);
      animation: rigPulse 2s ease-out infinite;
      pointer-events: none;
      z-index: 0;
    }
    @keyframes rigPulse {
      0% { transform: scale(0.75); opacity: 0.7; }
      70% { transform: scale(1.35); opacity: 0; }
      100% { transform: scale(1.35); opacity: 0; }
    }
  </style>
</head>
<body>
  <div id="map" role="application" aria-label="Map"></div>

  <aside class="panel">
    <div class="panel-inner">
      <h1 class="title">Where is bobo?</h1>
      <p class="device" id="tagTitle">—</p>
      <div class="last-updated">
        <div class="lu-label">Last updated</div>
        <div class="lu-value" id="lastUpdatedLine">—</div>
      </div>
      <div class="reload-row">
        <button type="button" class="reload-btn" id="reloadBtn" aria-label="Refresh location from Samsung">
          <i class="fa-solid fa-arrows-rotate" aria-hidden="true"></i>
          <span id="reloadLabel">Refresh</span>
        </button>
        <button type="button" class="history-open-btn" id="historyOpenBtn" aria-expanded="false" aria-controls="historySheet">
          <i class="fa-regular fa-clock" aria-hidden="true"></i>
          <span>History</span>
        </button>
      </div>
      <div class="err" id="errorBanner" role="status"><span id="errorText"></span></div>
    </div>
  </aside>

  <div id="historySheet" class="history-sheet" role="dialog" aria-modal="true" aria-labelledby="historySheetTitle" aria-hidden="true">
    <button type="button" class="history-sheet-backdrop" id="historyBackdrop" tabindex="-1" aria-label="Close history"></button>
    <div class="history-sheet-panel">
      <div class="history-sheet-head">
        <h2 id="historySheetTitle">bobo's history</h2>
        <button type="button" class="history-close" id="historyCloseBtn" aria-label="Close">×</button>
      </div>
      <div class="history-head">
        <span class="lu-label" style="margin-bottom:0">Points</span>
        <span class="history-count" id="historyCount">0 points</span>
      </div>
      <button type="button" class="reload-btn history-btn" id="historyRefreshBtn" aria-label="Update bobo's history from Samsung">
        <i class="fa-solid fa-arrows-rotate" aria-hidden="true"></i>
        <span id="historyRefreshLabel">Update bobo's history</span>
      </button>
      <ul class="history-list" id="historyList" aria-live="polite"></ul>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script>
    (function () {
      const REFRESH_MS = 30 * 1000;

      const map = L.map('map', { zoomControl: true, zoomSnap: 0.5 }).setView([20, 0], 2);

      L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
        attribution: '&copy; OpenStreetMap &copy; CARTO',
        subdomains: 'abcd',
        maxZoom: 20,
      }).addTo(map);

      map.zoomControl.setPosition('bottomright');

      var rigSvg =
        '<div class="rig-marker" aria-hidden="true">' +
        '<span class="rig-pulse"></span>' +
        '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 58 26" width="58" height="26">' +
        '<defs>' +
        '<linearGradient id="escBlack" x1="0" y1="0" x2="0" y2="1">' +
        '<stop offset="0" stop-color="#2d2d2d"/>' +
        '<stop offset="0.35" stop-color="#0a0a0a"/>' +
        '<stop offset="1" stop-color="#000"/>' +
        '</linearGradient>' +
        '<linearGradient id="escGlass" x1="0" y1="0" x2="1" y2="1">' +
        '<stop offset="0" stop-color="#1e3a5f"/>' +
        '<stop offset="1" stop-color="#0f172a"/>' +
        '</linearGradient>' +
        '<linearGradient id="uhOrange" x1="0" y1="0" x2="0" y2="1">' +
        '<stop offset="0" stop-color="#fb923c"/>' +
        '<stop offset="0.5" stop-color="#f97316"/>' +
        '<stop offset="1" stop-color="#ea580c"/>' +
        '</linearGradient>' +
        '</defs>' +
        '<ellipse cx="29" cy="23.5" rx="22" ry="1.8" fill="rgba(0,0,0,0.1)"/>' +
        '<g id="escalade">' +
        '<rect x="3.5" y="2.5" width="17" height="6.5" rx="1" fill="url(#escBlack)" stroke="#000" stroke-width="0.35"/>' +
        '<rect x="2" y="7.5" width="21" height="8.5" rx="1.2" fill="url(#escBlack)" stroke="#000" stroke-width="0.35"/>' +
        '<rect x="4.2" y="8.8" width="7" height="4.8" rx="0.45" fill="url(#escGlass)" opacity="0.9"/>' +
        '<rect x="13.5" y="8.8" width="7" height="4.8" rx="0.45" fill="url(#escGlass)" opacity="0.9"/>' +
        '<rect x="1.2" y="9.8" width="2.4" height="6.2" rx="0.35" fill="#d4d4d4" stroke="#737373" stroke-width="0.2"/>' +
        '<line x1="1.7" y1="11.2" x2="3.4" y2="11.2" stroke="#525252" stroke-width="0.4"/>' +
        '<line x1="1.7" y1="12.6" x2="3.4" y2="12.6" stroke="#525252" stroke-width="0.4"/>' +
        '<line x1="1.7" y1="14" x2="3.4" y2="14" stroke="#525252" stroke-width="0.4"/>' +
        '<line x1="1.7" y1="15.3" x2="3.4" y2="15.3" stroke="#525252" stroke-width="0.4"/>' +
        '</g>' +
        '<rect x="23.5" y="11.8" width="5" height="3" rx="0.45" fill="#1a1a1a" stroke="#000" stroke-width="0.2"/>' +
        '<g id="uhaul">' +
        '<rect x="29.5" y="6" width="26" height="10" rx="1.2" fill="url(#uhOrange)" stroke="#9a3412" stroke-width="0.45"/>' +
        '<rect x="30.5" y="7" width="24" height="3.2" rx="0.45" fill="#fff"/>' +
        '<rect x="30.5" y="10.4" width="24" height="1.15" fill="#b91c1c"/>' +
        '<text x="42.5" y="15.6" font-family="Arial Black,Arial,sans-serif" font-size="5.4" font-weight="900" fill="#fff" text-anchor="middle">U</text>' +
        '</g>' +
        '<g fill="#050505" stroke="#000" stroke-width="0.2">' +
        '<circle cx="10" cy="18.5" r="2.9"/><circle cx="10" cy="18.5" r="1.1" fill="#4a4a4a" stroke="none"/>' +
        '<circle cx="21" cy="18.5" r="2.9"/><circle cx="21" cy="18.5" r="1.1" fill="#4a4a4a" stroke="none"/>' +
        '<circle cx="35.5" cy="18.5" r="2.4"/><circle cx="35.5" cy="18.5" r="0.9" fill="#4a4a4a" stroke="none"/>' +
        '<circle cx="49.5" cy="18.5" r="2.4"/><circle cx="49.5" cy="18.5" r="0.9" fill="#4a4a4a" stroke="none"/>' +
        '</g>' +
        '</svg></div>';

      const icon = L.divIcon({
        className: 'tag-marker-wrap',
        html: rigSvg,
        iconSize: [58, 26],
        iconAnchor: [29, 26],
      });

      let marker = null;
      let lastKey = null;
      let lastKnownTimeIso = null;
      let historyPolyline = null;
      let historySheetOpen = false;

      function removeHistoryPolyline() {
        if (historyPolyline) {
          map.removeLayer(historyPolyline);
          historyPolyline = null;
        }
      }

      function openHistorySheet() {
        const sheet = document.getElementById('historySheet');
        const openBtn = document.getElementById('historyOpenBtn');
        sheet.classList.add('is-open');
        sheet.setAttribute('aria-hidden', 'false');
        openBtn.setAttribute('aria-expanded', 'true');
        historySheetOpen = true;
        loadHistory();
      }

      function closeHistorySheet() {
        const sheet = document.getElementById('historySheet');
        const openBtn = document.getElementById('historyOpenBtn');
        sheet.classList.remove('is-open');
        sheet.setAttribute('aria-hidden', 'true');
        openBtn.setAttribute('aria-expanded', 'false');
        historySheetOpen = false;
        removeHistoryPolyline();
      }

      function formatHistTime(iso) {
        if (!iso) return '—';
        const d = new Date(iso);
        if (Number.isNaN(d.getTime())) return iso;
        return d.toLocaleString(undefined, { dateStyle: 'medium', timeStyle: 'short' });
      }

      function updateHistoryPolyline(points) {
        removeHistoryPolyline();
        if (!points || points.length < 2) return;
        const sorted = [...points].sort((a, b) => Date.parse(a.timestamp) - Date.parse(b.timestamp));
        const latlngs = sorted.map(function (p) {
          return [Number(p.lat), Number(p.lng)];
        });
        historyPolyline = L.polyline(latlngs, {
          color: '#0284c7',
          weight: 3,
          opacity: 0.55,
          lineJoin: 'round',
          lineCap: 'round',
        }).addTo(map);
      }

      function renderHistoryList(points) {
        const ul = document.getElementById('historyList');
        const cnt = document.getElementById('historyCount');
        const n = points ? points.length : 0;
        cnt.textContent = n + ' point' + (n === 1 ? '' : 's');
        ul.innerHTML = '';
        if (!n) {
          ul.innerHTML = '<li style="border:none;color:var(--muted)">No history yet.</li>';
          return;
        }
        points.forEach(function (p) {
          const li = document.createElement('li');
          li.innerHTML =
            '<div class="t">' +
            formatHistTime(p.timestamp) +
            '</div><div class="c">' +
            Number(p.lat).toFixed(5) +
            ', ' +
            Number(p.lng).toFixed(5) +
            '</div>';
          ul.appendChild(li);
        });
      }

      async function loadHistory() {
        try {
          const r = await fetch('/api/history', { cache: 'no-store' });
          const data = await r.json();
          const pts = data.points || [];
          renderHistoryList(pts);
          if (historySheetOpen) {
            updateHistoryPolyline(pts);
          } else {
            removeHistoryPolyline();
          }
        } catch (e) {
          console.error(e);
        }
      }

      async function refreshHistoryFromSamsung() {
        const btn = document.getElementById('historyRefreshBtn');
        const label = document.getElementById('historyRefreshLabel');
        if (btn.disabled) return;
        btn.disabled = true;
        btn.classList.add('loading');
        btn.setAttribute('aria-busy', 'true');
        label.textContent = "Updating bobo's history…";
        try {
          const r = await fetch('/api/history/refresh', { method: 'POST', cache: 'no-store' });
          const data = await r.json();
          const pts = data.points || [];
          renderHistoryList(pts);
          if (historySheetOpen) {
            updateHistoryPolyline(pts);
          }
          if (data.error) {
            console.warn(data.error);
          }
          await fetchLocation();
        } catch (e) {
          console.error(e);
        } finally {
          btn.disabled = false;
          btn.classList.remove('loading');
          btn.removeAttribute('aria-busy');
          label.textContent = "Update bobo's history";
        }
      }

      document.getElementById('historyOpenBtn').addEventListener('click', openHistorySheet);
      document.getElementById('historyBackdrop').addEventListener('click', closeHistorySheet);
      document.getElementById('historyCloseBtn').addEventListener('click', closeHistorySheet);
      document.getElementById('historyRefreshBtn').addEventListener('click', refreshHistoryFromSamsung);
      document.addEventListener('keydown', function (e) {
        if (e.key === 'Escape' && historySheetOpen) {
          closeHistorySheet();
        }
      });

      function formatLocal(iso) {
        if (!iso) return '';
        const d = new Date(iso);
        if (Number.isNaN(d.getTime())) return '';
        return d.toLocaleString(undefined, { dateStyle: 'medium', timeStyle: 'short' });
      }

      function formatAgo(iso) {
        if (!iso) return '';
        const t = new Date(iso).getTime();
        if (Number.isNaN(t)) return '';
        const diff = Date.now() - t;
        const s = Math.floor(diff / 1000);
        if (s < 60) return 'just now';
        const m = Math.floor(s / 60);
        if (m < 60) return m === 1 ? '1 min ago' : m + ' min ago';
        const h = Math.floor(m / 60);
        if (h < 24) return h === 1 ? '1 hr ago' : h + ' hr ago';
        const d = Math.floor(h / 24);
        return d === 1 ? '1 day ago' : d + ' days ago';
      }

      function setLastUpdatedLine(iso) {
        const el = document.getElementById('lastUpdatedLine');
        if (!iso) {
          el.textContent = '—';
          return;
        }
        const local = formatLocal(iso);
        const ago = formatAgo(iso);
        if (local && ago) {
          el.textContent = local + ' · ' + ago;
        } else if (local) {
          el.textContent = local;
        } else if (ago) {
          el.textContent = ago;
        } else {
          el.textContent = '—';
        }
      }

      function setUi(data) {
        document.getElementById('tagTitle').textContent = data.tagName || 'bobo';

        const last = data.lastUpdated || data.timestamp;
        lastKnownTimeIso = last || null;
        setLastUpdatedLine(last);

        const err = document.getElementById('errorBanner');
        if (data.error) {
          document.getElementById('errorText').textContent = data.error;
          err.classList.add('visible');
        } else {
          err.classList.remove('visible');
        }
      }

      function applyLocation(data) {
        setUi(data);
        if (data.lat == null || data.lng == null) return;

        const lat = Number(data.lat);
        const lng = Number(data.lng);
        if (!Number.isFinite(lat) || !Number.isFinite(lng)) return;

        const key = lat.toFixed(5) + ',' + lng.toFixed(5);
        const moved = key !== lastKey;
        lastKey = key;

        if (!marker) {
          marker = L.marker([lat, lng], { icon }).addTo(map);
          map.setView([lat, lng], 15, { animate: true });
        } else {
          marker.setLatLng([lat, lng]);
          if (moved) {
            map.panTo([lat, lng], { animate: true, duration: 0.6, easeLinearity: 0.25 });
          }
        }
      }

      function refreshMapSize() {
        map.invalidateSize({ animate: false });
      }

      async function fetchLocation() {
        try {
          const r = await fetch('/api/location', { cache: 'no-store' });
          const data = await r.json();
          applyLocation(data);
          refreshMapSize();
          loadHistory();
        } catch (e) {
          console.error(e);
        }
      }

      async function refreshFromSamsung() {
        const btn = document.getElementById('reloadBtn');
        const label = document.getElementById('reloadLabel');
        if (btn.disabled) return;
        btn.disabled = true;
        btn.classList.add('loading');
        btn.setAttribute('aria-busy', 'true');
        label.textContent = 'Refreshing…';
        try {
          const r = await fetch('/api/refresh', { method: 'POST', cache: 'no-store' });
          const data = await r.json();
          if (data.refreshError) {
            console.warn(data.refreshError);
          }
          applyLocation(data);
          refreshMapSize();
          loadHistory();
        } catch (e) {
          console.error(e);
        } finally {
          btn.disabled = false;
          btn.classList.remove('loading');
          btn.removeAttribute('aria-busy');
          label.textContent = 'Refresh';
        }
      }

      document.getElementById('reloadBtn').addEventListener('click', refreshFromSamsung);

      window.addEventListener('resize', refreshMapSize);
      window.addEventListener('orientationchange', function () {
        setTimeout(refreshMapSize, 200);
      });
      if (window.visualViewport) {
        window.visualViewport.addEventListener('resize', refreshMapSize);
      }

      fetchLocation();
      setInterval(fetchLocation, REFRESH_MS);
      setInterval(function () {
        if (lastKnownTimeIso) setLastUpdatedLine(lastKnownTimeIso);
      }, 15000);
    })();
  </script>
</body>
</html>
