<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#e8eef4" />
  <link rel="icon" type="image/png" href="/img/car.png" />
  <link rel="apple-touch-icon" href="/img/car.png" />
  <title>Where is bobo?</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
  <style>
    :root {
      --text: #1e293b;
      --muted: #64748b;
      --accent: #0284c7;
      --panel: rgba(255, 255, 255, 0.94);
      --edge: rgba(15, 23, 42, 0.08);
      --ease-sheet: cubic-bezier(0.32, 0.72, 0, 1);
      --ease-fade: cubic-bezier(0.4, 0, 0.2, 1);
      --dur-sheet: 0.52s;
      --dur-backdrop: 0.42s;
    }

    *, *::before, *::after { box-sizing: border-box; }
    html {
      height: 100%;
      height: 100dvh;
      -webkit-text-size-adjust: 100%;
      -webkit-tap-highlight-color: transparent;
    }
    body {
      margin: 0;
      min-height: 100dvh;
      font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
      background: #e2e8f0;
      color: var(--text);
      overflow: hidden;
    }

    #map { position: fixed; inset: 0; z-index: 0; }

    .sidebar-stack {
      display: contents;
    }

    .panel {
      position: fixed;
      z-index: 1000;
      left: 0;
      right: 0;
      bottom: 0;
      padding: 0 max(16px, env(safe-area-inset-left), env(safe-area-inset-right)) max(16px, env(safe-area-inset-bottom));
      background: var(--panel);
      border-radius: 20px 20px 0 0;
      border: 1px solid var(--edge);
      border-bottom: none;
      box-shadow: 0 -4px 24px rgba(15, 23, 42, 0.08);
      transform: translateZ(0);
      backface-visibility: hidden;
    }
    .panel-inner { padding: 18px 4px 4px; }

    .title {
      margin: 0;
      font-size: clamp(1.2rem, 3.8vw, 1.45rem);
      font-weight: 600;
      line-height: 1.2;
      color: #f97316;
    }

    .viewers-pill {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      margin-top: 7px;
      padding: 3px 9px 3px 7px;
      background: rgba(15, 23, 42, 0.05);
      border: 1px solid var(--edge);
      border-radius: 999px;
      font-size: 0.75rem;
      font-weight: 500;
      color: var(--muted);
      line-height: 1;
      user-select: none;
    }
    .viewers-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #22c55e;
      flex-shrink: 0;
      animation: viewersPulse 2.2s ease-in-out infinite;
    }
    @keyframes viewersPulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.35; }
    }

    .device {
      margin: 8px 0 0;
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--text);
      word-break: break-word;
    }

    .last-updated {
      margin-top: 14px;
    }
    .lu-label {
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 6px;
    }
    .lu-value {
      font-size: 0.95rem;
      font-weight: 500;
      color: var(--text);
      line-height: 1.45;
      word-break: break-word;
    }

    .map-mode-toggle {
      display: flex;
      margin-top: 12px;
      padding: 3px;
      background: rgba(15, 23, 42, 0.06);
      border-radius: 12px;
      border: 1px solid var(--edge);
    }
    .map-mode-toggle .mode-btn {
      flex: 1;
      border: none;
      background: transparent;
      padding: 10px 12px;
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--muted);
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }
    .map-mode-toggle .mode-btn.is-active {
      background: #fff;
      color: var(--accent);
      box-shadow: 0 1px 6px rgba(15, 23, 42, 0.08);
    }

    .err {
      margin-top: 10px;
      padding: 10px 12px;
      border-radius: 10px;
      background: #fff1f2;
      border: 1px solid #fecdd3;
      color: #9f1239;
      font-size: 0.82rem;
      line-height: 1.4;
      display: none;
    }
    .err.visible { display: block; }

    .reload-row {
      display: flex;
      flex-direction: row;
      gap: 10px;
      margin-top: 14px;
    }
    .reload-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      flex: 1;
      min-width: 0;
      padding: 10px 12px;
      font: inherit;
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--text);
      background: #fff;
      border: 1px solid var(--edge);
      border-radius: 10px;
      cursor: pointer;
      box-shadow: 0 1px 2px rgba(15, 23, 42, 0.06);
      transition: transform 0.22s var(--ease-sheet), background 0.2s, border-color 0.2s, box-shadow 0.2s, opacity 0.2s;
    }
    .reload-btn:hover:not(:disabled) {
      background: #f8fafc;
      border-color: #cbd5e1;
    }
    .reload-btn:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }
    .reload-btn .fa-arrows-rotate {
      font-size: 1rem;
      flex-shrink: 0;
    }
    .reload-btn.loading .fa-arrows-rotate {
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @keyframes panelRevealMobile {
      0% {
        opacity: 0;
        transform: translate3d(0, calc(100% + 12px), 0);
        box-shadow: 0 -2px 12px rgba(15, 23, 42, 0.04);
      }
      100% {
        opacity: 1;
        transform: translate3d(0, 0, 0);
        box-shadow: 0 -4px 24px rgba(15, 23, 42, 0.08);
      }
    }

    @keyframes panelRevealDesktop {
      0% {
        opacity: 0;
        transform: translate3d(0, -14px, 0) scale(0.97);
      }
      100% {
        opacity: 1;
        transform: translate3d(0, 0, 0) scale(1);
      }
    }

    @media (max-width: 719px) {
      .panel {
        animation: panelRevealMobile 0.62s var(--ease-sheet) both;
      }
      .reload-btn:active:not(:disabled),
      .history-open-btn:active {
        transform: scale(0.97);
      }
    }

    .history-open-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      flex: 1;
      min-width: 0;
      padding: 10px 12px;
      font: inherit;
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--text);
      background: #fff;
      border: 1px solid var(--edge);
      border-radius: 10px;
      cursor: pointer;
      box-shadow: 0 1px 2px rgba(15, 23, 42, 0.06);
      transition: transform 0.22s var(--ease-sheet), background 0.2s, border-color 0.2s, box-shadow 0.2s;
    }
    .history-open-btn:hover {
      background: #f8fafc;
      border-color: #cbd5e1;
    }
    .history-open-btn .fa-clock {
      font-size: 1rem;
      flex-shrink: 0;
      opacity: 0.9;
    }

    .history-sheet {
      position: fixed;
      inset: 0;
      z-index: 1100;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      pointer-events: none;
    }
    .history-sheet.is-open {
      pointer-events: auto;
    }
    .history-sheet-backdrop {
      position: absolute;
      inset: 0;
      background: rgba(15, 23, 42, 0.38);
      border: none;
      padding: 0;
      cursor: pointer;
      opacity: 0;
      transition: opacity var(--dur-backdrop) var(--ease-fade);
    }
    .history-sheet.is-open .history-sheet-backdrop {
      opacity: 1;
    }
    @supports (backdrop-filter: blur(2px)) {
      .history-sheet-backdrop {
        background: rgba(15, 23, 42, 0.28);
        backdrop-filter: blur(0px);
        -webkit-backdrop-filter: blur(0px);
        transition:
          opacity var(--dur-backdrop) var(--ease-fade),
          backdrop-filter var(--dur-backdrop) var(--ease-fade),
          -webkit-backdrop-filter var(--dur-backdrop) var(--ease-fade);
      }
      .history-sheet.is-open .history-sheet-backdrop {
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
      }
    }
    .history-sheet-panel {
      position: relative;
      min-height: 0;
      max-height: min(78vh, 520px);
      background: var(--panel);
      border-radius: 20px 20px 0 0;
      border: 1px solid var(--edge);
      border-bottom: none;
      box-shadow: 0 -8px 40px rgba(15, 23, 42, 0.12);
      padding: 0 max(16px, env(safe-area-inset-left), env(safe-area-inset-right)) max(16px, env(safe-area-inset-bottom));
      display: flex;
      flex-direction: column;
      flex: 1 1 auto;
      transform: translate3d(0, 100%, 0) scale(0.96);
      transform-origin: bottom center;
      transition:
        transform var(--dur-sheet) var(--ease-sheet),
        box-shadow var(--dur-sheet) var(--ease-sheet);
    }
    .history-sheet.is-open .history-sheet-panel {
      transform: translate3d(0, 0, 0) scale(1);
      box-shadow: 0 -12px 48px rgba(15, 23, 42, 0.16);
      transition-delay: 0.06s;
    }
    .history-sheet:not(.is-open) .history-sheet-panel {
      transition-delay: 0s;
    }

    @keyframes historySheetContentIn {
      from {
        opacity: 0;
        transform: translate3d(0, 14px, 0);
      }
      to {
        opacity: 1;
        transform: translate3d(0, 0, 0);
      }
    }
    @keyframes historyListFadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    .history-sheet.is-open .history-sheet-head,
    .history-sheet.is-open .history-head {
      animation: historySheetContentIn 0.48s var(--ease-sheet) 0.1s both;
    }
    .history-sheet.is-open .history-btn {
      animation: historySheetContentIn 0.42s var(--ease-sheet) 0.14s both;
    }
    .history-sheet.is-open .history-list {
      animation: historyListFadeIn 0.5s var(--ease-fade) 0.2s both;
    }

    .history-sheet-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 16px 4px 12px;
      border-bottom: 1px solid var(--edge);
    }
    .history-sheet-head h2 {
      margin: 0;
      font-size: 1.05rem;
      font-weight: 600;
    }
    .history-close {
      width: 40px;
      height: 40px;
      border: none;
      border-radius: 10px;
      background: #f1f5f9;
      color: var(--text);
      font-size: 1.35rem;
      line-height: 1;
      cursor: pointer;
      flex-shrink: 0;
    }
    .history-close:hover {
      background: #e2e8f0;
    }
    .history-sheet .history-head {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 8px;
      margin: 12px 0 8px;
    }
    .history-count {
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--muted);
    }
    .history-btn {
      flex: 0 0 auto;
      display: flex;
      width: 100%;
      justify-content: center;
      margin-bottom: 8px;
    }
    .history-list {
      list-style: none;
      margin: 0;
      padding: 0 0 8px;
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      font-size: 0.8rem;
      color: var(--muted);
    }
    .history-list li {
      padding: 8px 0;
      border-bottom: 1px solid rgba(15, 23, 42, 0.06);
      line-height: 1.35;
    }
    .history-list li:last-child { border-bottom: none; }
    .history-list .t {
      font-weight: 600;
      color: var(--text);
      font-size: 0.82rem;
    }
    .history-list .c {
      font-size: 0.7rem;
      margin-top: 2px;
      word-break: break-all;
    }

    @media (min-width: 720px) {
      .sidebar-stack {
        display: flex;
        flex-direction: column;
        align-items: stretch;
        position: fixed;
        z-index: 1000;
        left: 16px;
        top: 16px;
        width: min(340px, calc(100vw - 32px));
        height: calc(100dvh - 32px);
        max-height: calc(100dvh - 32px);
        gap: 12px;
        pointer-events: none;
      }
      .sidebar-stack > * {
        pointer-events: auto;
      }
      .sidebar-stack .panel {
        position: relative;
        left: auto;
        right: auto;
        top: auto;
        bottom: auto;
        width: 100%;
        flex: 0 0 auto;
        border-radius: 16px;
        border: 1px solid var(--edge);
        border-bottom: 1px solid var(--edge);
        box-shadow: 0 8px 32px rgba(15, 23, 42, 0.1);
        animation: panelRevealDesktop 0.5s var(--ease-sheet) both;
      }
      .panel-inner { padding: 18px; }

      .sidebar-stack .history-sheet {
        position: relative;
        inset: auto;
        z-index: auto;
        flex: 0 0 0;
        min-height: 0;
        max-height: 0;
        overflow: hidden;
        width: 100%;
        display: flex;
        flex-direction: column;
        justify-content: flex-start;
        align-items: stretch;
      }
      .sidebar-stack .history-sheet.is-open {
        flex: 1 1 0;
        min-height: 0;
        max-height: none;
        overflow: hidden;
      }
      .sidebar-stack .history-sheet-backdrop {
        display: none !important;
      }
      .sidebar-stack .history-sheet-panel {
        flex: 1 1 auto;
        min-height: 0;
        max-height: none;
        width: 100%;
        margin: 0;
        border-radius: 16px;
        border: 1px solid var(--edge);
        box-shadow: 0 8px 32px rgba(15, 23, 42, 0.1);
        padding: 0 max(16px, env(safe-area-inset-left), env(safe-area-inset-right)) max(16px, env(safe-area-inset-bottom));
        transform-origin: top center;
        transform: translate3d(0, 12px, 0) scale(0.98);
        opacity: 0;
        transition:
          transform var(--dur-sheet) var(--ease-sheet),
          opacity var(--dur-backdrop) var(--ease-fade),
          box-shadow var(--dur-sheet) var(--ease-sheet);
      }
      .sidebar-stack .history-sheet.is-open .history-sheet-panel {
        transform: translate3d(0, 0, 0) scale(1);
        opacity: 1;
        box-shadow: 0 8px 32px rgba(15, 23, 42, 0.12);
        transition-delay: 0.04s;
      }
      .sidebar-stack .history-sheet:not(.is-open) .history-sheet-panel {
        transition-delay: 0s;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      :root {
        --dur-sheet: 0.01ms;
        --dur-backdrop: 0.01ms;
      }
      .panel {
        animation: none !important;
      }
      .reload-btn,
      .history-open-btn {
        transition: none;
      }
      .history-sheet-backdrop {
        transition: none;
        backdrop-filter: none !important;
        -webkit-backdrop-filter: none !important;
      }
      .history-sheet.is-open .history-sheet-backdrop {
        backdrop-filter: none !important;
        -webkit-backdrop-filter: none !important;
      }
      .history-sheet-panel {
        transition: none !important;
      }
      .history-sheet.is-open .history-sheet-head,
      .history-sheet.is-open .history-head,
      .history-sheet.is-open .history-btn,
      .history-sheet.is-open .history-list {
        animation: none !important;
      }
    }

    @media (max-width: 719px) {
      .leaflet-bottom.leaflet-right {
        bottom: auto !important;
        top: max(10px, env(safe-area-inset-top)) !important;
        right: max(10px, env(safe-area-inset-right)) !important;
      }
    }

    .leaflet-control-zoom {
      border: 1px solid var(--edge) !important;
      border-radius: 12px !important;
      overflow: hidden;
      box-shadow: 0 2px 12px rgba(15, 23, 42, 0.1) !important;
    }
    .leaflet-control-zoom a {
      width: 40px !important;
      height: 40px !important;
      line-height: 40px !important;
      color: var(--text) !important;
      background: #fff !important;
    }
    .leaflet-control-attribution {
      font-size: 10px !important;
      background: rgba(255, 255, 255, 0.85) !important;
      color: var(--muted) !important;
    }

    .tag-marker-wrap {
      background: none !important;
      border: none !important;
    }
    .rig-marker {
      position: relative;
      width: 96px;
      height: 96px;
    }
    .rig-rotate {
      width: 96px;
      height: 96px;
      transform-origin: 50% 50%;
      transition: transform 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      position: relative;
      z-index: 1;
    }
    .rig-marker .rig-img {
      display: block;
      width: 96px;
      height: 96px;
      object-fit: contain;
    }
    .rig-pulse {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 36px;
      height: 36px;
      margin-left: -18px;
      margin-top: -18px;
      border-radius: 50%;
      pointer-events: none;
      z-index: 0;
      background: radial-gradient(
        circle,
        rgba(234, 88, 12, 0.38) 0%,
        rgba(249, 115, 22, 0.16) 40%,
        rgba(249, 115, 22, 0.04) 58%,
        transparent 76%
      );
      transform-origin: center center;
      animation: rigPulse 2.75s cubic-bezier(0.22, 0.61, 0.36, 1) infinite;
      will-change: transform, opacity;
    }
    .rig-pulse--b {
      animation-delay: 1.38s;
    }
    @keyframes rigPulse {
      0% {
        transform: scale(0.5);
        opacity: 0;
      }
      10% {
        opacity: 0.92;
      }
      50% {
        opacity: 0.18;
      }
      100% {
        transform: scale(2.7);
        opacity: 0;
      }
    }

    /* —— Home splash —— */
    .home-splash {
      position: fixed;
      inset: 0;
      z-index: 2000;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: max(24px, env(safe-area-inset-top)) max(20px, env(safe-area-inset-right)) max(24px, env(safe-area-inset-bottom)) max(20px, env(safe-area-inset-left));
      overflow: hidden;
      background: #0c1222;
      transition:
        opacity 0.85s var(--ease-fade),
        transform 0.85s var(--ease-sheet),
        visibility 0s linear 0.85s;
    }
    .home-splash__aurora {
      position: absolute;
      inset: -40%;
      background:
        radial-gradient(ellipse 80% 50% at 20% 40%, rgba(249, 115, 22, 0.45), transparent 55%),
        radial-gradient(ellipse 70% 60% at 80% 20%, rgba(56, 189, 248, 0.35), transparent 50%),
        radial-gradient(ellipse 60% 80% at 50% 100%, rgba(167, 139, 250, 0.4), transparent 55%),
        radial-gradient(ellipse 50% 40% at 70% 60%, rgba(244, 63, 94, 0.2), transparent 45%);
      animation: auroraDrift 18s ease-in-out infinite alternate;
      will-change: transform;
    }
    @keyframes auroraDrift {
      0% { transform: translate(-4%, -2%) rotate(0deg) scale(1); }
      100% { transform: translate(4%, 3%) rotate(8deg) scale(1.08); }
    }
    .home-splash__mesh {
      position: absolute;
      inset: 0;
      background:
        linear-gradient(125deg, rgba(12, 18, 34, 0.2) 0%, transparent 45%),
        linear-gradient(300deg, rgba(15, 23, 42, 0.85) 0%, transparent 50%);
      pointer-events: none;
    }
    .home-splash__stars {
      position: absolute;
      inset: 0;
      background-image:
        radial-gradient(1.5px 1.5px at 10% 20%, rgba(255, 255, 255, 0.55), transparent),
        radial-gradient(1px 1px at 30% 70%, rgba(255, 255, 255, 0.35), transparent),
        radial-gradient(1.5px 1.5px at 55% 15%, rgba(255, 255, 255, 0.45), transparent),
        radial-gradient(1px 1px at 72% 45%, rgba(255, 255, 255, 0.3), transparent),
        radial-gradient(1.5px 1.5px at 88% 80%, rgba(255, 255, 255, 0.4), transparent),
        radial-gradient(1px 1px at 15% 90%, rgba(255, 255, 255, 0.35), transparent);
      background-size: 100% 100%;
      animation: starsTwinkle 5s ease-in-out infinite;
      opacity: 0.9;
      pointer-events: none;
    }
    @keyframes starsTwinkle {
      0%, 100% { opacity: 0.65; }
      50% { opacity: 1; }
    }
    .home-splash__ring {
      position: absolute;
      left: 50%;
      top: 42%;
      width: min(120vw, 720px);
      height: min(120vw, 720px);
      margin-left: calc(min(120vw, 720px) / -2);
      margin-top: calc(min(120vw, 720px) / -2);
      border-radius: 50%;
      border: 1px solid rgba(255, 255, 255, 0.06);
      animation: ringPulse 4.5s ease-in-out infinite;
      pointer-events: none;
    }
    .home-splash__ring--b {
      animation-delay: 1.1s;
      width: min(100vw, 600px);
      height: min(100vw, 600px);
      margin-left: calc(min(100vw, 600px) / -2);
      margin-top: calc(min(100vw, 600px) / -2);
      opacity: 0.45;
    }
    @keyframes ringPulse {
      0%, 100% { opacity: 0.28; }
      50% { opacity: 0.55; }
    }
    .home-splash__content {
      position: relative;
      z-index: 2;
      max-width: 28rem;
      text-align: center;
    }
    .home-splash__car-wrap {
      position: relative;
      width: 140px;
      height: 140px;
      margin: 0 auto 0;
      animation: carEntrance 1.2s cubic-bezier(0.22, 0.61, 0.36, 1) 0.15s both;
    }
    @keyframes carEntrance {
      0% {
        opacity: 0;
        transform: translateY(36px) scale(0.6) rotate(-12deg);
      }
      100% {
        opacity: 1;
        transform: translateY(0) scale(1) rotate(0deg);
      }
    }
    .home-splash__car-float {
      position: relative;
      animation: carFloat 4s ease-in-out infinite;
      transform-origin: 52% 58%;
    }
    /* Forward = toward the car’s nose (faces left in asset). Slope ~8° down toward the front. */
    @keyframes carFloat {
      0%, 100% { transform: translate(0, 0); }
      50% { transform: translate(-18px, 2.5px); }
    }
    .home-splash__car {
      position: relative;
      z-index: 1;
      display: block;
      width: 140px;
      height: 140px;
      object-fit: contain;
      background: transparent;
      /* Avoid filter: blur/drop-shadow on PNG — they often composite transparency as black. */
    }
    .home-splash__glow {
      position: absolute;
      left: 50%;
      top: 55%;
      z-index: 0;
      width: 100px;
      height: 40px;
      margin-left: -50px;
      background: radial-gradient(ellipse, rgba(249, 115, 22, 0.55) 0%, transparent 70%);
      animation: glowBreathe 3s ease-in-out infinite;
      pointer-events: none;
    }
    @keyframes glowBreathe {
      0%, 100% { opacity: 0.5; transform: scaleX(1); }
      50% { opacity: 0.95; transform: scaleX(1.15); }
    }
    .home-splash__headline {
      margin: -20px 0 18px;
      font-size: clamp(1.45rem, 5vw, 1.85rem);
      font-weight: 700;
      line-height: 1.28;
      letter-spacing: -0.02em;
      color: #f8fafc;
    }
    .home-splash__line {
      display: block;
      animation: lineIn 0.9s var(--ease-sheet) both;
    }
    .home-splash__line:nth-child(1) { animation-delay: 0.45s; }
    .home-splash__line:nth-child(2) { animation-delay: 0.62s; }
    @keyframes lineIn {
      from {
        opacity: 0;
        transform: translateY(22px);
        filter: blur(6px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
        filter: blur(0);
      }
    }
    .home-splash__sub {
      margin: 0;
      font-size: clamp(1rem, 3.2vw, 1.12rem);
      font-weight: 500;
      line-height: 1.5;
      background: linear-gradient(
        110deg,
        #94a3b8 0%,
        #e2e8f0 22%,
        #fbbf24 45%,
        #e2e8f0 68%,
        #94a3b8 100%
      );
      background-size: 220% auto;
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      animation: subShimmer 6s linear infinite, subIn 0.85s var(--ease-sheet) 0.85s both;
    }
    @keyframes subIn {
      from { opacity: 0; transform: translateY(14px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes subShimmer {
      0% { background-position: 100% center; }
      100% { background-position: -100% center; }
    }
    @media (prefers-reduced-motion: reduce) {
      .home-splash__aurora,
      .home-splash__stars,
      .home-splash__ring,
      .home-splash__car-float,
      .home-splash__glow,
      .home-splash__sub {
        animation: none !important;
      }
      .home-splash__car-wrap,
      .home-splash__line,
      .home-splash__sub {
        animation: none !important;
        opacity: 1;
        transform: none;
        filter: none;
      }
      .home-splash__sub {
        color: #cbd5e1;
        background: none;
        -webkit-background-clip: unset;
        background-clip: unset;
      }
    }
  </style>
</head>
<body>
  <div id="homeSplash" class="home-splash" role="region" aria-labelledby="homeSplashTitle" aria-describedby="homeSplashDesc">
    <div class="home-splash__aurora" aria-hidden="true"></div>
    <div class="home-splash__mesh" aria-hidden="true"></div>
    <div class="home-splash__stars" aria-hidden="true"></div>
    <div class="home-splash__ring" aria-hidden="true"></div>
    <div class="home-splash__ring home-splash__ring--b" aria-hidden="true"></div>
    <div class="home-splash__content">
      <div class="home-splash__car-wrap">
        <div class="home-splash__car-float">
          <div class="home-splash__glow" aria-hidden="true"></div>
          <img class="home-splash__car" src="img/car.png" width="140" height="140" alt="" draggable="false" />
        </div>
      </div>
      <h1 id="homeSplashTitle" class="home-splash__headline">
        <span class="home-splash__line">Bobo has somehow arrived—</span>
        <span class="home-splash__line">but we're not done yet.</span>
      </h1>
      <p id="homeSplashDesc" class="home-splash__sub">There's always more adventures with Bobo.</p>
    </div>
  </div>

  <div id="map" role="application" aria-label="Map"></div>

  <div class="sidebar-stack">
  <aside class="panel">
    <div class="panel-inner">
      <h1 class="title">Where is bobo?</h1>
      <div class="viewers-pill" id="viewersPill" aria-live="polite" aria-label="Live viewers">
        <span class="viewers-dot" aria-hidden="true"></span>
        <span id="viewersText">1 watching</span>
      </div>
      <div class="map-mode-toggle" role="group" aria-label="Map pin mode">
        <button type="button" class="mode-btn" id="modeProjected" aria-pressed="true">Projected</button>
        <button type="button" class="mode-btn" id="modeLive" aria-pressed="false">Live</button>
      </div>
      <div class="last-updated">
        <div class="lu-label">Last updated</div>
        <div class="lu-value" id="lastUpdatedLine">—</div>
      </div>
      <div class="last-updated">
        <div class="lu-label">ETA Orlando</div>
        <div class="lu-value" id="etaOrlandoLine">—</div>
      </div>
      <div class="reload-row">
        <button type="button" class="reload-btn" id="reloadBtn" aria-label="Refresh location">
          <i class="fa-solid fa-arrows-rotate" aria-hidden="true"></i>
          <span id="reloadLabel">Refresh</span>
        </button>
        <button type="button" class="history-open-btn" id="historyOpenBtn" aria-expanded="false" aria-controls="historySheet">
          <i class="fa-regular fa-clock" aria-hidden="true"></i>
          <span>History</span>
        </button>
      </div>
      <div class="err" id="errorBanner" role="status"><span id="errorText"></span></div>
    </div>
  </aside>

  <div id="historySheet" class="history-sheet" role="dialog" aria-modal="true" aria-labelledby="historySheetTitle" aria-hidden="true">
    <button type="button" class="history-sheet-backdrop" id="historyBackdrop" tabindex="-1" aria-label="Close history"></button>
    <div class="history-sheet-panel">
      <div class="history-sheet-head">
        <h2 id="historySheetTitle">bobo's history</h2>
        <button type="button" class="history-close" id="historyCloseBtn" aria-label="Close">×</button>
      </div>
      <div class="history-head">
        <span class="lu-label" style="margin-bottom:0">Points</span>
        <span class="history-count" id="historyCount">0 points</span>
      </div>
      <button type="button" class="reload-btn history-btn" id="historyRefreshBtn" aria-label="Update bobo's history">
        <i class="fa-solid fa-arrows-rotate" aria-hidden="true"></i>
        <span id="historyRefreshLabel">Update bobo's history</span>
      </button>
      <ul class="history-list" id="historyList" aria-live="polite"></ul>
    </div>
  </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script>
    (function () {
      const REFRESH_MS = 30 * 1000;

      const map = L.map('map', { zoomControl: true, zoomSnap: 0.5 }).setView([20, 0], 2);

      L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
        attribution: '&copy; OpenStreetMap &copy; CARTO',
        subdomains: 'abcd',
        maxZoom: 20,
      }).addTo(map);

      map.zoomControl.setPosition('bottomright');

      var rigSvg =
        '<div class="rig-marker" aria-hidden="true">' +
        '<span class="rig-pulse rig-pulse--a"></span>' +
        '<span class="rig-pulse rig-pulse--b"></span>' +
        '<div class="rig-rotate">' +
        '<img class="rig-img" src="img/car.png" width="96" height="96" alt="" draggable="false" />' +
        '</div>' +
        '</div>';

      const icon = L.divIcon({
        className: 'tag-marker-wrap',
        html: rigSvg,
        iconSize: [96, 96],
        iconAnchor: [48, 48],
      });

      const ORLANDO_LAT = 28.5383;
      const ORLANDO_LNG = -81.3792;
      /** Along OSRM driving route when available; else great-circle from last ping time. */
      const PROJECTION_SPEED_MPH = 80;
      const MPH_TO_MS = 1609.344 / 3600;
      /**
       * PNG at rotate(0) shows the car facing left (west). Offset maps geographic bearing (clockwise from north)
       * to CSS rotation so the car “front” points along that bearing (here: toward Orlando).
       */
      const CAR_BEARING_OFFSET_DEG = 90;

      function toRad(d) {
        return (d * Math.PI) / 180;
      }

      function bearingDegrees(lat1, lng1, lat2, lng2) {
        const φ1 = toRad(lat1);
        const φ2 = toRad(lat2);
        const Δλ = toRad(lng2 - lng1);
        const y = Math.sin(Δλ) * Math.cos(φ2);
        const x = Math.cos(φ1) * Math.sin(φ2) - Math.sin(φ1) * Math.cos(φ2) * Math.cos(Δλ);
        const θ = Math.atan2(y, x);
        return ((θ * 180) / Math.PI + 360) % 360;
      }

      /** Normalize to [0, 360). */
      function normDeg(d) {
        if (!Number.isFinite(d)) return null;
        return ((d % 360) + 360) % 360;
      }

      function haversineMeters(lat1, lng1, lat2, lng2) {
        const R = 6371000;
        const φ1 = toRad(lat1);
        const φ2 = toRad(lat2);
        const Δφ = toRad(lat2 - lat1);
        const Δλ = toRad(lng2 - lng1);
        const a =
          Math.sin(Δφ / 2) * Math.sin(Δφ / 2) +
          Math.cos(φ1) * Math.cos(φ2) * Math.sin(Δλ / 2) * Math.sin(Δλ / 2);
        return 2 * R * Math.asin(Math.min(1, Math.sqrt(a)));
      }

      /** Move along a great circle from (lat,lng) with initial bearing (deg) for distanceM meters. */
      function destinationPointM(latDeg, lngDeg, bearingDeg, distanceM) {
        const R = 6371000;
        const δ = distanceM / R;
        const θ = toRad(bearingDeg);
        const φ1 = toRad(latDeg);
        const λ1 = toRad(lngDeg);
        const sinφ1 = Math.sin(φ1);
        const cosφ1 = Math.cos(φ1);
        const sinδ = Math.sin(δ);
        const cosδ = Math.cos(δ);
        const sinφ2 = sinφ1 * cosδ + cosφ1 * sinδ * Math.cos(θ);
        const φ2 = Math.asin(sinφ2);
        const y = Math.sin(θ) * sinδ * cosφ1;
        const x = cosδ - sinφ1 * sinφ2;
        const λ2 = λ1 + Math.atan2(y, x);
        let lng2 = (λ2 * 180) / Math.PI;
        lng2 = ((lng2 + 540) % 360) - 180;
        return { lat: (φ2 * 180) / Math.PI, lng: lng2 };
      }

      function formatEtaSeconds(sec) {
        if (!Number.isFinite(sec) || sec <= 0) return 'Arrived';
        const s = Math.floor(sec);
        if (s < 60) return '< 1 min';
        const m = Math.floor(s / 60);
        if (m < 60) return m === 1 ? '1 min' : m + ' min';
        const h = Math.floor(m / 60);
        const rm = m % 60;
        if (rm === 0) return h === 1 ? '1 hr' : h + ' hr';
        return h + ' hr ' + rm + ' min';
      }

      const OSRM_ROUTE_BASES = [
        'https://router.project-osrm.org/route/v1/driving',
        'https://routing.openstreetmap.de/routed-car/route/v1/driving',
      ];

      function anchorKey(anchor) {
        return anchor.lat.toFixed(5) + ',' + anchor.lng.toFixed(5);
      }

      /** @param {number[][]} coords GeoJSON-style [lng, lat][] */
      function buildCumulativeDistances(coords) {
        const cum = [0];
        for (let i = 1; i < coords.length; i++) {
          const d = haversineMeters(coords[i - 1][1], coords[i - 1][0], coords[i][1], coords[i][0]);
          cum.push(cum[i - 1] + d);
        }
        return cum;
      }

      /** Distance in meters along polyline; coords [lng,lat][], cumDistM from buildCumulativeDistances */
      function positionAlongPolyline(coords, cumDistM, dM) {
        if (!coords.length) return null;
        if (dM <= 0) {
          const brg =
            coords.length > 1
              ? bearingDegrees(coords[0][1], coords[0][0], coords[1][1], coords[1][0])
              : bearingDegrees(coords[0][1], coords[0][0], ORLANDO_LAT, ORLANDO_LNG);
          return { lat: coords[0][1], lng: coords[0][0], bearing: brg };
        }
        const total = cumDistM[cumDistM.length - 1];
        if (dM >= total) {
          const last = coords.length - 1;
          const brg =
            last > 0
              ? bearingDegrees(coords[last - 1][1], coords[last - 1][0], coords[last][1], coords[last][0])
              : bearingDegrees(coords[last][1], coords[last][0], ORLANDO_LAT, ORLANDO_LNG);
          return { lat: coords[last][1], lng: coords[last][0], bearing: brg };
        }
        let i = 1;
        while (i < cumDistM.length && cumDistM[i] < dM) i++;
        const i0 = i - 1;
        const segLen = cumDistM[i] - cumDistM[i0];
        const t = segLen > 0 ? (dM - cumDistM[i0]) / segLen : 0;
        const lat = coords[i0][1] + t * (coords[i][1] - coords[i0][1]);
        const lng = coords[i0][0] + t * (coords[i][0] - coords[i0][0]);
        const brg = bearingDegrees(coords[i0][1], coords[i0][0], coords[i][1], coords[i][0]);
        return { lat: lat, lng: lng, bearing: brg };
      }

      async function fetchDrivingRoute(lat1, lng1, lat2, lng2) {
        const path = lng1 + ',' + lat1 + ';' + lng2 + ',' + lat2;
        const qs = 'overview=full&geometries=geojson&steps=false';
        for (let bi = 0; bi < OSRM_ROUTE_BASES.length; bi++) {
          try {
            const r = await fetch(OSRM_ROUTE_BASES[bi] + '/' + path + '?' + qs, { cache: 'no-store' });
            if (!r.ok) continue;
            const d = await r.json();
            if (d.code !== 'Ok' || !d.routes || !d.routes[0]) continue;
            const g = d.routes[0].geometry;
            if (g && g.coordinates && g.coordinates.length >= 2) {
              return { coordinates: g.coordinates, distanceM: d.routes[0].distance };
            }
          } catch (err) {
            console.warn('[route]', err);
          }
        }
        return null;
      }

      let marker = null;
      let lastKnownTimeIso = null;
      let projectionRaf = 0;
      let projectionLoopStarted = false;
      /** Last ping anchor: projection starts here; time advances from pingMs. */
      let samsungAnchor = null;
      /** Address fallback when no tag coords yet ({ lat, lng, pingMs }). */
      let fallbackAnchor = null;
      /** Road geometry from anchor to Orlando: { anchorKey, coordinates, cumDistM, totalM } */
      let activeRoute = null;
      let routeLinePolyline = null;
      let routeFetchSeq = 0;
      /** Snapped position for Live mode */
      let liveDisplayPos = null;
      /** 'projected' | 'live' */
      let viewMode = localStorage.getItem('boboMapMode') === 'live' ? 'live' : 'projected';
      let historyPolyline = null;
      let historySheetOpen = false;

      function removeHistoryPolyline() {
        if (historyPolyline) {
          map.removeLayer(historyPolyline);
          historyPolyline = null;
        }
      }

      function openHistorySheet() {
        const sheet = document.getElementById('historySheet');
        const openBtn = document.getElementById('historyOpenBtn');
        sheet.classList.add('is-open');
        sheet.setAttribute('aria-hidden', 'false');
        openBtn.setAttribute('aria-expanded', 'true');
        historySheetOpen = true;
        loadHistory();
      }

      function closeHistorySheet() {
        const sheet = document.getElementById('historySheet');
        const openBtn = document.getElementById('historyOpenBtn');
        sheet.classList.remove('is-open');
        sheet.setAttribute('aria-hidden', 'true');
        openBtn.setAttribute('aria-expanded', 'false');
        historySheetOpen = false;
        removeHistoryPolyline();
      }

      function formatHistTime(iso) {
        if (!iso) return '—';
        const d = new Date(iso);
        if (Number.isNaN(d.getTime())) return iso;
        return d.toLocaleString(undefined, { dateStyle: 'medium', timeStyle: 'short' });
      }

      function updateHistoryPolyline(points) {
        removeHistoryPolyline();
        if (!points || points.length < 2) return;
        const sorted = [...points].sort((a, b) => Date.parse(a.timestamp) - Date.parse(b.timestamp));
        const latlngs = sorted.map(function (p) {
          return [Number(p.lat), Number(p.lng)];
        });
        historyPolyline = L.polyline(latlngs, {
          color: '#0284c7',
          weight: 3,
          opacity: 0.55,
          lineJoin: 'round',
          lineCap: 'round',
        }).addTo(map);
      }

      function renderHistoryList(points) {
        const ul = document.getElementById('historyList');
        const cnt = document.getElementById('historyCount');
        const n = points ? points.length : 0;
        cnt.textContent = n + ' point' + (n === 1 ? '' : 's');
        ul.innerHTML = '';
        if (!n) {
          ul.innerHTML = '<li style="border:none;color:var(--muted)">No history yet.</li>';
          return;
        }
        points.forEach(function (p) {
          const li = document.createElement('li');
          li.innerHTML =
            '<div class="t">' +
            formatHistTime(p.timestamp) +
            '</div><div class="c">' +
            Number(p.lat).toFixed(5) +
            ', ' +
            Number(p.lng).toFixed(5) +
            '</div>';
          ul.appendChild(li);
        });
      }

      async function loadHistory() {
        try {
          const r = await fetch('/api/history', { cache: 'no-store' });
          const data = await r.json();
          const pts = data.points || [];
          renderHistoryList(pts);
          if (historySheetOpen) {
            updateHistoryPolyline(pts);
          } else {
            removeHistoryPolyline();
          }
        } catch (e) {
          console.error(e);
        }
      }

      async function refreshHistoryFromSamsung() {
        const btn = document.getElementById('historyRefreshBtn');
        const label = document.getElementById('historyRefreshLabel');
        if (btn.disabled) return;
        btn.disabled = true;
        btn.classList.add('loading');
        btn.setAttribute('aria-busy', 'true');
        label.textContent = "Updating bobo's history…";
        try {
          const r = await fetch('/api/history/refresh', { method: 'POST', cache: 'no-store' });
          const data = await r.json();
          const pts = data.points || [];
          renderHistoryList(pts);
          if (historySheetOpen) {
            updateHistoryPolyline(pts);
          }
          if (data.error) {
            console.warn(data.error);
          }
          await fetchLocation();
        } catch (e) {
          console.error(e);
        } finally {
          btn.disabled = false;
          btn.classList.remove('loading');
          btn.removeAttribute('aria-busy');
          label.textContent = "Update bobo's history";
        }
      }

      document.getElementById('historyOpenBtn').addEventListener('click', openHistorySheet);
      document.getElementById('historyBackdrop').addEventListener('click', closeHistorySheet);
      document.getElementById('historyCloseBtn').addEventListener('click', closeHistorySheet);
      document.getElementById('historyRefreshBtn').addEventListener('click', refreshHistoryFromSamsung);
      document.addEventListener('keydown', function (e) {
        if (e.key === 'Escape' && historySheetOpen) {
          closeHistorySheet();
        }
      });

      function formatLocal(iso) {
        if (!iso) return '';
        const d = new Date(iso);
        if (Number.isNaN(d.getTime())) return '';
        return d.toLocaleString(undefined, { dateStyle: 'medium', timeStyle: 'short' });
      }

      function formatAgo(iso) {
        if (!iso) return '';
        const t = new Date(iso).getTime();
        if (Number.isNaN(t)) return '';
        const diff = Date.now() - t;
        const s = Math.floor(diff / 1000);
        if (s < 60) return 'just now';
        const m = Math.floor(s / 60);
        if (m < 60) return m === 1 ? '1 min ago' : m + ' min ago';
        const h = Math.floor(m / 60);
        if (h < 24) return h === 1 ? '1 hr ago' : h + ' hr ago';
        const d = Math.floor(h / 24);
        return d === 1 ? '1 day ago' : d + ' days ago';
      }

      function setLastUpdatedLine(iso) {
        const el = document.getElementById('lastUpdatedLine');
        if (!iso) {
          el.textContent = '—';
          return;
        }
        const local = formatLocal(iso);
        const ago = formatAgo(iso);
        if (local && ago) {
          el.textContent = local + ' · ' + ago;
        } else if (local) {
          el.textContent = local;
        } else if (ago) {
          el.textContent = ago;
        } else {
          el.textContent = '—';
        }
      }

      function setUi(data) {
        const last = data.lastUpdated || data.timestamp;
        lastKnownTimeIso = last || null;
        setLastUpdatedLine(last);

        const err = document.getElementById('errorBanner');
        if (data.error) {
          document.getElementById('errorText').textContent = data.error;
          err.classList.add('visible');
        } else {
          err.classList.remove('visible');
        }
      }

      function removeRoutePolyline() {
        if (routeLinePolyline) {
          map.removeLayer(routeLinePolyline);
          routeLinePolyline = null;
        }
      }

      function drawRoutePolyline() {
        removeRoutePolyline();
        if (!activeRoute || !activeRoute.coordinates) return;
        const latlngs = activeRoute.coordinates.map(function (c) {
          return [c[1], c[0]];
        });
        routeLinePolyline = L.polyline(latlngs, {
          color: '#0369a1',
          weight: 5,
          opacity: 0.42,
          lineJoin: 'round',
          lineCap: 'round',
        }).addTo(map);
      }

      async function refreshRouteForAnchor(anchor) {
        if (!anchor) return;
        const key = anchorKey(anchor);
        const seq = ++routeFetchSeq;
        const res = await fetchDrivingRoute(anchor.lat, anchor.lng, ORLANDO_LAT, ORLANDO_LNG);
        if (seq !== routeFetchSeq) return;
        const cur = samsungAnchor || fallbackAnchor;
        if (!cur || anchorKey(cur) !== key) return;
        if (!res || !res.coordinates || res.coordinates.length < 2) {
          activeRoute = null;
          removeRoutePolyline();
          return;
        }
        const cum = buildCumulativeDistances(res.coordinates);
        activeRoute = {
          anchorKey: key,
          coordinates: res.coordinates,
          cumDistM: cum,
          totalM: cum[cum.length - 1],
        };
        drawRoutePolyline();
      }

      function updateModeToggleUi() {
        const p = document.getElementById('modeProjected');
        const l = document.getElementById('modeLive');
        if (!p || !l) return;
        p.classList.toggle('is-active', viewMode === 'projected');
        l.classList.toggle('is-active', viewMode === 'live');
        p.setAttribute('aria-pressed', viewMode === 'projected' ? 'true' : 'false');
        l.setAttribute('aria-pressed', viewMode === 'live' ? 'true' : 'false');
        try {
          localStorage.setItem('boboMapMode', viewMode);
        } catch (e) {}
      }

      function ensureProjectionLoop() {
        if (projectionLoopStarted) return;
        projectionLoopStarted = true;
        const speedMps = PROJECTION_SPEED_MPH * MPH_TO_MS;
        const etaEl = document.getElementById('etaOrlandoLine');

        function tick() {
          if (viewMode === 'live') {
            if (!liveDisplayPos) {
              etaEl.textContent = 'Waiting for location…';
              if (marker) {
                map.removeLayer(marker);
                marker = null;
              }
              projectionRaf = requestAnimationFrame(tick);
              return;
            }
            const brg = bearingDegrees(liveDisplayPos.lat, liveDisplayPos.lng, ORLANDO_LAT, ORLANDO_LNG);
            const cssDeg = normDeg(brg + CAR_BEARING_OFFSET_DEG);
            if (!marker) {
              marker = L.marker([liveDisplayPos.lat, liveDisplayPos.lng], { icon }).addTo(map);
              map.setView([liveDisplayPos.lat, liveDisplayPos.lng], 11, { animate: true });
            } else {
              marker.setLatLng([liveDisplayPos.lat, liveDisplayPos.lng]);
            }
            setMarkerRotation(cssDeg);
            etaEl.textContent = '—';
            projectionRaf = requestAnimationFrame(tick);
            return;
          }

          const anchor = samsungAnchor || fallbackAnchor;
          if (!anchor) {
            etaEl.textContent = 'Waiting for location…';
            removeRoutePolyline();
            activeRoute = null;
            if (marker) {
              map.removeLayer(marker);
              marker = null;
            }
            projectionRaf = requestAnimationFrame(tick);
            return;
          }

          let elapsedSec = (Date.now() - anchor.pingMs) / 1000;
          if (!Number.isFinite(elapsedSec) || elapsedSec < 0) elapsedSec = 0;
          const distTraveled = speedMps * elapsedSec;

          const key = anchorKey(anchor);
          let pos;
          let remainingM;
          let etaSec;
          let brg;
          let usedRoad = false;

          if (activeRoute && activeRoute.anchorKey === key && activeRoute.totalM > 0) {
            const along = Math.min(distTraveled, activeRoute.totalM);
            const pt = positionAlongPolyline(activeRoute.coordinates, activeRoute.cumDistM, along);
            if (pt) {
              pos = { lat: pt.lat, lng: pt.lng };
              remainingM = Math.max(0, activeRoute.totalM - along);
              etaSec = speedMps > 0 ? remainingM / speedMps : 0;
              brg = pt.bearing;
              usedRoad = true;
            }
          }

          if (!usedRoad) {
            const totalM = haversineMeters(anchor.lat, anchor.lng, ORLANDO_LAT, ORLANDO_LNG);
            const bearingFromPing = bearingDegrees(anchor.lat, anchor.lng, ORLANDO_LAT, ORLANDO_LNG);
            const along = Math.min(distTraveled, totalM);
            pos = destinationPointM(anchor.lat, anchor.lng, bearingFromPing, along);
            remainingM = Math.max(0, totalM - along);
            etaSec = speedMps > 0 ? remainingM / speedMps : 0;
            brg = bearingDegrees(pos.lat, pos.lng, ORLANDO_LAT, ORLANDO_LNG);
          }

          const cssDeg = normDeg(brg + CAR_BEARING_OFFSET_DEG);

          if (!marker) {
            marker = L.marker([pos.lat, pos.lng], { icon }).addTo(map);
            map.setView([pos.lat, pos.lng], 10, { animate: true });
          } else {
            marker.setLatLng([pos.lat, pos.lng]);
          }
          setMarkerRotation(cssDeg);

          const miLeft = remainingM / 1609.344;
          etaEl.textContent =
            formatEtaSeconds(etaSec) +
            ' · ' +
            (miLeft < 0.05 ? '0' : miLeft < 10 ? miLeft.toFixed(1) : Math.round(miLeft)) +
            ' mi to go';

          projectionRaf = requestAnimationFrame(tick);
        }
        tick();
      }

      async function loadFallbackAnchor() {
        try {
          const r = await fetch('/api/projection-origin', { cache: 'no-store' });
          const data = await r.json();
          if (data.ok && Number.isFinite(data.lat) && Number.isFinite(data.lng)) {
            var pos = await snapCoordsForMap(data.lat, data.lng);
            fallbackAnchor = { lat: pos.lat, lng: pos.lng, pingMs: Date.now() };
            if (!samsungAnchor) refreshRouteForAnchor(fallbackAnchor);
          }
        } catch (e) {
          console.error(e);
        }
      }

      function setMarkerRotation(deg) {
        if (!marker) return;
        const el = marker.getElement();
        if (!el) return;
        const rotate = el.querySelector('.rig-rotate');
        if (rotate) {
          rotate.style.transform = 'rotate(' + deg + 'deg)';
        }
      }

      async function snapValhallaInBrowser(lat, lng) {
        try {
          const r = await fetch('https://valhalla1.openstreetmap.de/locate', {
            method: 'POST',
            headers: { Accept: 'application/json', 'Content-Type': 'application/json' },
            body: JSON.stringify({ locations: [{ lat: lat, lon: lng }] }),
          });
          if (!r.ok) return null;
          const data = await r.json();
          if (!data || !data[0] || !data[0].edges || !data[0].edges[0]) return null;
          var e = data[0].edges[0];
          if (Number.isFinite(e.correlated_lat) && Number.isFinite(e.correlated_lon)) {
            return { lat: e.correlated_lat, lng: e.correlated_lon };
          }
        } catch (err) {}
        return null;
      }

      async function snapOsrmNearest(lat, lng) {
        var bases = [
          'https://router.project-osrm.org/nearest/v1/driving',
          'https://routing.openstreetmap.de/routed-car/nearest/v1/driving',
        ];
        for (var bi = 0; bi < bases.length; bi++) {
          try {
            var r2 = await fetch(bases[bi] + '/' + lng + ',' + lat);
            if (!r2.ok) continue;
            var d = await r2.json();
            if (d.code !== 'Ok' || !d.waypoints || !d.waypoints[0]) continue;
            var loc = d.waypoints[0].location;
            if (!loc || loc.length < 2) continue;
            var lat2 = loc[1];
            var lon2 = loc[0];
            if (Number.isFinite(lat2) && Number.isFinite(lon2)) {
              return { lat: lat2, lng: lon2 };
            }
          } catch (err) {}
        }
        return null;
      }

      async function snapCoordsForMap(lat, lng) {
        if (!Number.isFinite(lat) || !Number.isFinite(lng)) return { lat: lat, lng: lng };
        var v = await snapValhallaInBrowser(lat, lng);
        if (v) return v;
        try {
          const r = await fetch(
            '/api/snap?lat=' + encodeURIComponent(lat) + '&lng=' + encodeURIComponent(lng),
            { cache: 'no-store' }
          );
          const j = await r.json();
          if (j.ok && Number.isFinite(j.lat) && Number.isFinite(j.lng)) {
            return { lat: j.lat, lng: j.lng };
          }
        } catch (e) {
          console.warn('[snap] /api/snap failed', e);
        }
        var o = await snapOsrmNearest(lat, lng);
        if (o) return o;
        return { lat: lat, lng: lng };
      }

      async function applyLocation(data) {
        setUi(data);
        const lat = Number(data.lat);
        const lng = Number(data.lng);
        const last = data.lastUpdated || data.timestamp;
        if (!Number.isFinite(lat) || !Number.isFinite(lng)) return;

        var pos;
        try {
          pos = await snapCoordsForMap(lat, lng);
        } catch (e) {
          pos = { lat: lat, lng: lng };
        }
        liveDisplayPos = { lat: pos.lat, lng: pos.lng };

        if (last) {
          const pingMs = Date.parse(last);
          if (Number.isFinite(pingMs)) {
            samsungAnchor = { lat: pos.lat, lng: pos.lng, pingMs: pingMs };
            refreshRouteForAnchor(samsungAnchor);
          }
        }
      }

      function refreshMapSize() {
        map.invalidateSize({ animate: false });
      }

      async function fetchLocation() {
        try {
          const r = await fetch('/api/location', { cache: 'no-store' });
          const data = await r.json();
          await applyLocation(data);
          refreshMapSize();
          loadHistory();
        } catch (e) {
          console.error(e);
        }
      }

      async function refreshFromSamsung() {
        const btn = document.getElementById('reloadBtn');
        const label = document.getElementById('reloadLabel');
        if (btn.disabled) return;
        btn.disabled = true;
        btn.classList.add('loading');
        btn.setAttribute('aria-busy', 'true');
        label.textContent = 'Refreshing…';
        try {
          const r = await fetch('/api/refresh', { method: 'POST', cache: 'no-store' });
          const data = await r.json();
          if (data.refreshError) {
            console.warn(data.refreshError);
          }
          await applyLocation(data);
          refreshMapSize();
          loadHistory();
        } catch (e) {
          console.error(e);
        } finally {
          btn.disabled = false;
          btn.classList.remove('loading');
          btn.removeAttribute('aria-busy');
          label.textContent = 'Refresh';
        }
      }

      document.getElementById('reloadBtn').addEventListener('click', refreshFromSamsung);

      document.getElementById('modeProjected').addEventListener('click', function () {
        viewMode = 'projected';
        updateModeToggleUi();
        if (activeRoute) drawRoutePolyline();
      });
      document.getElementById('modeLive').addEventListener('click', function () {
        viewMode = 'live';
        updateModeToggleUi();
        if (activeRoute) drawRoutePolyline();
      });

      window.addEventListener('resize', refreshMapSize);
      window.addEventListener('orientationchange', function () {
        setTimeout(refreshMapSize, 200);
      });
      if (window.visualViewport) {
        window.visualViewport.addEventListener('resize', refreshMapSize);
      }

      updateModeToggleUi();
      ensureProjectionLoop();
      fetchLocation();
      loadFallbackAnchor();
      setInterval(fetchLocation, REFRESH_MS);
      setInterval(function () {
        if (lastKnownTimeIso) setLastUpdatedLine(lastKnownTimeIso);
      }, 15000);

      (function initViewers() {
        var pill = document.getElementById('viewersPill');
        var label = document.getElementById('viewersText');

        function connect() {
          var es = new EventSource('/api/viewers');
          es.onmessage = function (e) {
            try {
              var d = JSON.parse(e.data);
              var n = d.count || 1;
              label.textContent = n === 1 ? '1 watching' : n + ' watching';
            } catch (_) {}
          };
          es.onerror = function () {
            es.close();
            setTimeout(connect, 5000);
          };
        }

        if (typeof EventSource !== 'undefined') {
          connect();
        } else {
          pill.style.display = 'none';
        }
      })();
    })();
  </script>
</body>
